name: Deploy Backend to EC2 (Production)

on:
  push:
    branches:
      - latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.EC2_SSH_KEY }}

      - name: Disable strict host key checking
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts || true

      - name: Deploy to EC2 using deploy script
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PROJECT_PATH: ${{ secrets.EC2_PROJECT_PATH }}
        run: |
          echo "Connecting to EC2 and running deployment..."
          ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'EOF'
            set -e
            echo "✅ Connected to EC2"

            # Go to project directory
            cd "$EC2_PROJECT_PATH"

            echo "📥 Pulling latest code from latest branch..."
            git fetch --all
            git checkout latest || git checkout -b latest origin/latest
            git pull origin latest

            echo "📦 Installing dependencies..."
            npm install --production

            echo "🔄 Restarting PM2..."
            pm2 restart alphalinkup-backend || pm2 start src/server.js --name alphalinkup-backend
            pm2 save

            echo "✅ Deployment finished."

            echo "✅ Deployment finished."
          EOF


